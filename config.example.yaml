# Copy this file to config.yaml and fill in every value marked REPLACE_ME.
# Nothing in this example is a working credential.

# ---- Core ---------------------------------------------------------------

# Flask session key. Generate with: python -c "import secrets; print(secrets.token_hex(32))"
secret_key: "REPLACE_ME_WITH_A_LONG_RANDOM_STRING"

# Web UI
web:
  host: "0.0.0.0"
  port: 8080

# Set true when running behind a TLS-terminating reverse proxy that sets
# X-Forwarded-For / X-Forwarded-Proto (nginx, Caddy, Traefik, ...).
trust_proxy: false

# Set true in production so session cookies are only sent over HTTPS.
session_cookie_secure: false

# ---- Audit --------------------------------------------------------------

audit_log_path: "logs/audit.log"
audit_rotation: "weekly"   # weekly | daily | off

# ---- Service health checks ---------------------------------------------
#
# Two independent probes per configured service surface coloured chips on
# the dashboard and fire a `service_health_fail` / `service_health_ok`
# pair in the audit log on every OK ↔ down transition (deliberately
# debounced — one event per incident, not one per check).
#
# local  — TCP connect from the gateway itself, every local_interval.
#          Green "reachable" chip = service is up + routable from here.
#          Always on.
# public — POST to https://portchecker.io every public_check_interval to
#          ask whether the service is reachable from the open internet.
#          A red "publicly exposed" chip means the whole premise of the
#          gateway is broken for that service — investigate immediately.
#          OFF BY DEFAULT; opt in by setting public_check_enabled: true.
#          This sends your service hostname + port to portchecker.io.

service_health:
  local_interval: 300            # seconds between local TCP probes
  public_check_enabled: false    # query portchecker.io? (sends hostname)
  public_check_interval: 21600   # seconds between public probes (6h)

# ---- Shared network (peer-to-peer opt-in) -------------------------------
#
# Injects a synthetic service ("shared-network" by default) that users can
# activate just like any other. While active, every opted-in user can reach
# every other opted-in user's WG IP directly over the tunnel — a small,
# end-to-end-encrypted mesh for ad-hoc collaboration (copy files, screen
# share over SSH, throwaway HTTP server, whatever).
#
# Same 1h-grant/8h-cap/extend/auto-expire semantics as other services.
# Same admin controls: block per user, approve per user (if requires_approval
# is set), lock entire user. Outside members cannot see the mesh members
# or reach their IPs — traffic between members is also inaccessible to
# non-members.
#
# Set enabled: false if you don't want this feature available at all.

shared_network:
  enabled: true                   # default on; flip to disable entirely
  name: "shared-network"          # service name shown on the dashboard
  requires_approval: false        # set true to gate per user via admin approval

# ---- WireGuard gateway --------------------------------------------------

# UDP endpoint the client will dial. Must be reachable from every user's
# machine — a public hostname + port, or an IP for private/VPN access.
wg_endpoint: "gateway.example.com:51820"

# Interface name + address space exposed to peers. The gateway always
# owns the first host IP in this range (.1); each user is allocated the
# next free IP on first WG config download.
wg_interface: "wg0"
wg_network: "10.77.0.0/24"
wg_listen_port: 51820

# Filename of downloaded configs -> "<name>.conf". Also becomes the
# wg-quick interface name, so must be <= 15 chars and match [a-z0-9-].
# If unset, derived from the first label of wg_endpoint.
# wg_config_name: "example-gw"

# Network interface used for egress to the real services. Inside Docker
# this is usually eth0.
egress_interface: "eth0"

# Directory that persists the server's WG keypair and per-user peer
# assignments. BACK THIS UP — losing it invalidates every handed-out
# client config.
state_dir: "state"

# Optional DNS pushed to clients. Comment out to leave the client's DNS
# alone (recommended: only service traffic should go through the tunnel,
# including DNS would leak lookups).
# wg_client_dns: "1.1.1.1"

# Set false for non-root local development (skips `ip` / `wg` / `iptables`
# calls so the web UI still boots). Must be true inside the Docker image.
enable_netfilter: true

# ---- Users --------------------------------------------------------------
#
# Accounts that sign in with username + password. Leave `users` empty and
# rely entirely on GitHub OAuth if you prefer — the login form hides the
# password fields when no users are defined.
#
# Generate a password hash with:   python hash_password.py
# Paste the output of the command as the value of `password_hash`.

users: {}
# users:
#   yourname:
#     password_hash: "REPLACE_ME_WITH_BCRYPT_HASH"

# Usernames in this list can see the audit log, see every user who has a
# WG config, revoke configs, kick individual grants, block services per
# user, and lock users out entirely. Everyone else only sees their own
# dashboard. Admin status can also come from a GitHub team (see below).
admins: []
# admins:
#   - yourname

# ---- GitHub OAuth (optional) -------------------------------------------
#
# When enabled, the login page shows a "Sign in with GitHub" button. After
# the OAuth dance, a user is only allowed in if they are an active member
# of `required_team` inside `required_org` (or `required_org` if no team
# is set). Team membership is re-checked periodically; if they're removed
# from the team the session is revoked on the next check.
#
# Register an OAuth App at https://github.com/settings/developers (or
# https://github.com/organizations/<ORG>/settings/applications for
# org-owned apps) with the callback URL
#     https://<your-gateway-hostname>/oauth/github/callback
# and paste the client_id + client_secret below.

# oauth:
#   github:
#     client_id: "REPLACE_ME"
#     client_secret: "REPLACE_ME"
#     required_org: "your-org"
#     required_team: "your-team-slug"   # omit to check org membership only
#     admin_team: "your-admin-team"     # optional: members get admin in UI
#     reverify_interval: 300            # seconds between membership re-checks

# ---- Services -----------------------------------------------------------
#
# Each entry is a destination reachable through the tunnel once activated.
# `hostname` is resolved at startup (and refreshed every 5 minutes); the
# resolved IP(s) go into the user's WG `AllowedIPs` and into the gateway's
# iptables FORWARD rule.
#
# Optional fields:
#   cidrs:             [ "1.2.3.0/24" ]   pin explicit IPs (skip DNS for these)
#   port:              443                 restrict to one port; omit for any
#   protocol:          "tcp"               defaults to tcp
#   requires_approval: true                off-by-default; an admin must call
#                                          "Approve" per user before they can
#                                          activate it. Block still overrides
#                                          approval.

services:
  - name: example-ssh
    hostname: "ssh.internal.example.com"
    port: 22

  - name: example-web
    hostname: "console.internal.example.com"
    port: 443

  - name: example-db
    hostname: "db.internal.example.com"
    port: 5432
    requires_approval: true
