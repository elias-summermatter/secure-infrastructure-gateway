<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='logo.svg') }}">
  <title>Sign in</title>
  <style nonce="{{ csp_nonce }}">
    body { font-family: system-ui, -apple-system, sans-serif; background: #1e1e2e; color: #cdd6f4; display: flex; flex-direction: column; min-height: 100vh; align-items: center; justify-content: center; margin: 0; }
    .page-footer { margin-top: 2rem; color: #6c7086; font-size: 0.85rem; text-align: center; }
    .page-footer a { color: #89b4fa; text-decoration: none; }
    .page-footer a:hover { color: #74c7ec; text-decoration: underline; }
    form { background: #313244; padding: 2rem; border-radius: 10px; min-width: 340px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    h1 { margin: 0 0 0.25rem 0; font-size: 1.25rem; }
    .subtitle { color: #a6adc8; font-size: 0.85rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.25rem; color: #a6adc8; font-size: 0.85rem; }
    input { width: 100%; padding: 0.6rem; margin-bottom: 1rem; background: #1e1e2e; color: inherit; border: 1px solid #45475a; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
    input:focus { outline: none; border-color: #89b4fa; }
    button { width: 100%; padding: 0.7rem; background: #89b4fa; color: #1e1e2e; border: 0; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 1rem; }
    button:hover { background: #74c7ec; }
    .error { color: #f38ba8; background: #2a1a22; padding: 0.5rem 0.75rem; border-radius: 6px; margin-bottom: 1rem; font-size: 0.9rem; }
    .btn-github { display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; padding: 0.7rem; background: #45475a; color: #cdd6f4; text-decoration: none; border-radius: 6px; font-weight: 600; font-size: 1rem; box-sizing: border-box; }
    .btn-github:hover { background: #585b70; }
    .btn-github svg { width: 18px; height: 18px; fill: currentColor; }
    .divider { display: flex; align-items: center; gap: 0.75rem; color: #6c7086; font-size: 0.8rem; margin: 1rem 0; }
    .divider::before, .divider::after { content: ""; flex: 1; border-top: 1px solid #45475a; }
    .brand-logo { display: block; width: 56px; height: 56px; margin: 0 auto 1rem; filter: drop-shadow(0 4px 12px rgba(137, 180, 250, 0.3)); }
  </style>
</head>
<body>
  <form method="post">
    <img class="brand-logo" src="{{ url_for('static', filename='logo.svg') }}" alt="">
    <h1>Portcullis</h1>
    <div class="subtitle">Sign in to manage your WireGuard access</div>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    {% if github_enabled %}
    <a class="btn-github" href="{{ url_for('oauth_github_login') }}">
      <svg viewBox="0 0 16 16" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/></svg>
      Sign in with GitHub
    </a>
    {% if password_enabled %}<div class="divider">or</div>{% endif %}
    {% endif %}
    {% if password_enabled %}
    <label for="username">Username</label>
    <input id="username" name="username" autofocus required autocomplete="username">
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password">
    <button type="submit">Sign in</button>
    {% endif %}
  </form>
  <footer class="page-footer">
    Developed by Elias Summermatter ·
    <a href="https://github.com/elias-summermatter/portcullis" target="_blank" rel="noopener">GitHub</a>
  </footer>
</body>
</html>
